name: Foundry CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Foundry
        run: |
          curl -L https://foundry.paradigm.xyz | bash
          source ~/.bashrc
          foundryup

      - name: Build
        run: forge build

      - name: Run Tests
        run: forge test -vv

      - name: Gas Report
        run: forge test --gas-report

              - name: Install Slither
        run: pip install slither-analyzer

      - name: Run Slither
        run: slither .